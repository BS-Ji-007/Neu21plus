name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and create release
    runs-on: ubuntu-latest
    env:
      GIT_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Rename build artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv build/libs/neu21plus-*.jar "build/libs/Neu21Plus-${VERSION}.jar" 2>/dev/null || true
          ls -la build/libs/

      - name: Generate checksums
        run: |
          cd build/libs
          sha256sum *.jar > checksums-sha256.txt
          md5sum *.jar > checksums-md5.txt
          echo "SHA256:" && cat checksums-sha256.txt
          echo "MD5:" && cat checksums-md5.txt

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          last_tag="$(git tag --sort=-creatordate | head -2 | tail -1)"

          read -r -d '' extra_notes <<EOF
          Do **NOT** trust any mod just because they publish a checksum associated with it.
          These checksums are meant to verify only that two files are identical.
          They are not a certificate of origin or a guarantee of the author.

          sha256sum: \`$(cat build/libs/checksums-sha256.txt | cut -f 1 -d ' ' | tr -d '\n')\`
          md5sum: \`$(cat build/libs/checksums-md5.txt | cut -f 1 -d ' ' | tr -d '\n')\`
          EOF

          preReleaseParam=""
          if echo "$VERSION" | grep -qiE 'alpha|beta|pre|rc|snapshot'; then
            preReleaseParam="--prerelease"
          fi

          gh release create \
            --title "Neu21Plus ${VERSION}" \
            --verify-tag \
            --generate-notes \
            --notes-start-tag "$last_tag" \
            $preReleaseParam \
            --notes "$extra_notes" \
            "$VERSION" \
            build/libs/*.jar
        env:
          GH_TOKEN: ${{ github.token }}
