name: Build

on:
  push:
    branches:
      - "*"
    paths-ignore:
      - "README.md"
      - "COPYING"
      - "COPYING.LESSER"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - "FAQ.md"
      - "**.md"
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - "README.md"
      - "COPYING"
      - "COPYING.LESSER"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - "FAQ.md"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build with Gradle
    runs-on: ubuntu-latest
    env:
      GIT_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.sha }}
      REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/port-26.1' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Neu21Plus-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 14

  lint:
    name: Check banned imports
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for banned imports
        run: .github/workflows/ban-imports.sh
