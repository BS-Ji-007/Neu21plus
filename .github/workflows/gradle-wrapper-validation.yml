name: Validate Gradle Wrapper

on:
  push:
    paths:
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  pull_request:
    paths:
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: Validate wrapper JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
